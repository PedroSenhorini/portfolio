<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedro Senhorini — Skills</title>
  <link rel="stylesheet" href="./styles/style.css" />
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
</head>
<body>

  <header class="cabecalho">
    <button class="cabecalho_hamburger" id="menuToggle" aria-label="Abrir menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <nav class="cabecalho_menu" id="mainMenu">
      <a class="cabecalho_link" href="index.html">Home</a>
      <a class="cabecalho_link" href="about.html">Sobre mim</a>
      <a class="cabecalho_link active" href="skills.html">Skills</a>
      <a class="cabecalho_link" href="projects.html">Projetos</a>
      <a class="cabecalho_link" href="contact.html">Contato</a>
    </nav>
  </header>

  <main class="skills">

    <div class="skills-header">
      <span class="page-label" style="opacity:1;animation:none;">Tecnologias</span>
      <h1>Minhas <span>Skills</span></h1>
      <p class="skills-subtitle">Tecnologias que estou aprendendo e desenvolvendo</p>
    </div>

    <div class="skills-grid">
      <div class="skill-card" style="--delay: 0.1s">
        <img src="./assets/html.png" alt="HTML5" />
        <div class="skill-info">
          <h3>HTML5</h3>
          <p>Marcação semântica e estrutura web</p>
        </div>
      </div>
      <div class="skill-card" style="--delay: 0.2s">
        <img src="./assets/css.png" alt="CSS3" />
        <div class="skill-info">
          <h3>CSS3</h3>
          <p>Estilização e design responsivo</p>
        </div>
      </div>
      <div class="skill-card" style="--delay: 0.3s">
        <img src="./assets/JS.png" alt="JavaScript" />
        <div class="skill-info">
          <h3>JavaScript</h3>
          <p>Interatividade e lógica frontend</p>
        </div>
      </div>
      <div class="skill-card" style="--delay: 0.4s">
        <img src="./assets/react.png" alt="React" />
        <div class="skill-info">
          <h3>React</h3>
          <p>Componentes e aplicações dinâmicas</p>
        </div>
      </div>
    </div>

  </main>

<script src="./scripts/reveal.js"></script>
<script>
  var toggle = document.getElementById("menuToggle");
  var menu = document.getElementById("mainMenu");
  if (toggle && menu) {
    toggle.addEventListener("click", function() {
      menu.classList.toggle("open");
      var isOpen = menu.classList.contains("open");
      toggle.innerHTML = isOpen
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
    });
  }
</script>
</body>
</html>
